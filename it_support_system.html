<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IT Support Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header .icon {
      width: 56px;
      height: 56px;
      background: #e8f0fe;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 26px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a2e;
    }
    .header p {
      font-size: 14px;
      color: #6b7280;
      margin-top: 4px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      color: #1a1a2e;
      outline: none;
      transition: border 0.2s;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      border-color: #4f46e5;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    .field { margin-bottom: 1.2rem; }
    button {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    button:hover { background: #4338ca; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    .loading {
      text-align: center;
      padding: 1.5rem;
      color: #6b7280;
      font-size: 14px;
      display: none;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e5e7eb;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result {
      margin-top: 1.5rem;
      border-radius: 12px;
      overflow: hidden;
      border: 1.5px solid #e5e7eb;
      display: none;
    }
    .result-header {
      background: #4f46e5;
      color: white;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
    }
    .result-body { padding: 1rem; }
    .result-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .result-row:last-child { border-bottom: none; }
    .result-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .result-label {
      font-size: 12px;
      color: #6b7280;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .result-value {
      font-size: 14px;
      color: #1a1a2e;
      font-weight: 500;
      margin-top: 2px;
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-blue { background: #e8f0fe; color: #3730a3; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    .badge-yellow { background: #fef9c3; color: #854d0e; }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-orange { background: #ffedd5; color: #9a3412; }
    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon">🖥️</div>
      <h1>IT Support Portal</h1>
      <p>Get instant AI-powered solutions to your IT problems</p>
    </div>

    <div class="field">
      <label>Your Name</label>
      <input type="text" id="name" placeholder="Enter your name" />
    </div>

    <div class="field">
      <label>Describe Your Issue</label>
      <textarea id="issue" placeholder="e.g. I forgot my password and cannot login..."></textarea>
    </div>

    <button id="submitBtn" onclick="submitIssue()">Get Solution</button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      Analyzing your issue with AI...
    </div>

    <div class="error" id="error">Something went wrong. Please try again.</div>

    <div class="result" id="result">
      <div class="result-header">AI Support Response</div>
      <div class="result-body" id="resultBody"></div>
    </div>
  </div>

  <script>
    async function submitIssue() {
      const name = document.getElementById('name').value.trim();
      const issue = document.getElementById('issue').value.trim();

      if (!name || !issue) {
        alert('Please enter your name and describe your issue.');
        return;
      }

      const btn = document.getElementById('submitBtn');
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');
      const error = document.getElementById('error');

      btn.disabled = true;
      loading.style.display = 'block';
      result.style.display = 'none';
      error.style.display = 'none';

      try {
        const response = await fetch(
          'https://siri-chandana.app.n8n.cloud/webhook/it-support',
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user: name, issue: issue })
          }
        );

        const raw = await response.text();
        const cleaned = raw.startsWith('=') ? raw.slice(1) : raw;
        const outer = JSON.parse(cleaned);
        const data = JSON.parse(outer.text);

        const priorityColors = {
          low: 'badge-green',
          medium: 'badge-yellow',
          high: 'badge-orange',
          critical: 'badge-red'
        };

        const categoryIcons = {
          password_reset: '🔑',
          network_issue: '📡',
          hardware_problem: '💻',
          software_error: '⚙️'
        };

        const priorityColor = priorityColors[data.priority?.toLowerCase()] || 'badge-blue';
        const categoryIcon = categoryIcons[data.category] || '🛠️';

        document.getElementById('resultBody').innerHTML = `
          <div class="result-row">
            <div class="result-icon" style="background:#e8f0fe;">${categoryIcon}</div>
            <div>
              <div class="result-label">Category</div>
              <div class="result-value">${data.category?.replace(/_/g,' ').toUpperCase()}</div>
            </div>
          </div>
          <div class="result-row">
            <div class="result-icon" style="background:#fef9c3;">⚡</div>
            <div>
              <div class="result-label">Priority</div>
              <div class="result-value"><span class="badge ${priorityColor}">${data.priority?.toUpperCase()}</span></div>
            </div>
          </div>
          <div class="result-row">
            <div class="result-icon" style="background:#dcfce7;">🔧</div>
            <div>
              <div class="result-label">Solution</div>
              <div class="result-value">${data.solution}</div>
            </div>
          </div>
          <div class="result-row">
            <div class="result-icon" style="background:${data.escalate ? '#fee2e2' : '#dcfce7'};">👤</div>
            <div>
              <div class="result-label">Escalate to IT Team</div>
              <div class="result-value"><span class="badge ${data.escalate ? 'badge-red' : 'badge-green'}">${data.escalate ? 'YES - Human Support Needed' : 'NO - AI Solution Sufficient'}</span></div>
            </div>
          </div>
        `;

        result.style.display = 'block';
      } catch (err) {
        error.style.display = 'block';
      } finally {
        btn.disabled = false;
        loading.style.display = 'none';
      }
    }
  </script>
</body>
</html>
